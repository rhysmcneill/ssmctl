name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release/release-please-config.json
          manifest-file: tools/release/.release-please-manifest.json

  build-and-release:
    name: Build and Release
    needs: release-please
    if: github.repository == 'rhysmcneill/ssmctl' && needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.tag_name != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Derive version from release tag
        id: version
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          test -n "$TAG"
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        run: make build-all VERSION=${{ steps.version.outputs.VERSION }}

      - name: Generate checksums
        run: |
          cd bin
          sha256sum \
            ssmctl-darwin-amd64 \
            ssmctl-darwin-arm64 \
            ssmctl-linux-amd64 \
            ssmctl-linux-arm64 \
            ssmctl-windows-amd64.exe \
            ssmctl-windows-arm64.exe > checksums.txt

      - name: Verify checksum manifest
        run: |
          cd bin
          for file in \
            ssmctl-darwin-amd64 \
            ssmctl-darwin-arm64 \
            ssmctl-linux-amd64 \
            ssmctl-linux-arm64 \
            ssmctl-windows-amd64.exe \
            ssmctl-windows-arm64.exe; do
            grep -Eq "^[0-9a-f]{64}[[:space:]]+${file}$" checksums.txt
          done

      - name: Upload release artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.6.1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          fail_on_unmatched_files: true
          files: |
            bin/ssmctl-*
            bin/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          SHA_DARWIN_AMD64=$(awk '/ssmctl-darwin-amd64/{print $1}' bin/checksums.txt)
          SHA_DARWIN_ARM64=$(awk '/ssmctl-darwin-arm64/{print $1}' bin/checksums.txt)
          SHA_LINUX_AMD64=$(awk  '/ssmctl-linux-amd64/{print $1}'  bin/checksums.txt)
          SHA_LINUX_ARM64=$(awk  '/ssmctl-linux-arm64/{print $1}'  bin/checksums.txt)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/rhysmcneill/homebrew-ssmctl.git" tap
          cd tap

          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "s|sha256 \".*\" # darwin-amd64|sha256 \"${SHA_DARWIN_AMD64}\" # darwin-amd64|" \
            -e "s|sha256 \".*\" # darwin-arm64|sha256 \"${SHA_DARWIN_ARM64}\" # darwin-arm64|" \
            -e "s|sha256 \".*\" # linux-amd64|sha256 \"${SHA_LINUX_AMD64}\" # linux-amd64|" \
            -e "s|sha256 \".*\" # linux-arm64|sha256 \"${SHA_LINUX_ARM64}\" # linux-arm64|" \
            Formula/ssmctl.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ssmctl.rb
          git commit -m "chore: bump ssmctl to v${VERSION}"
          git push
