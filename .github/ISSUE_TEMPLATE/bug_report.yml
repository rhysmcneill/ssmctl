name: Bug report
description: Report a reproducible bug or regression in ssmctl
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.

        Before submitting, please search existing issues to avoid duplicates.

  - type: textarea
    id: bug-description
    attributes:
      label: What happened?
      description: Describe the bug and its impact.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating system
    validations:
      required: true

  - type: input
    id: ssmctl-version
    attributes:
      label: ssmctl version
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
