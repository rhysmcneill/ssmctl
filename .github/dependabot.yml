version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
    assignees:
      - rhysmcneill

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    assignees:
      - rhysmcneill
    groups:
      codeql:
        patterns:
          - "github/codeql-action*"
      clusterfuzzlite:
        patterns:
          - "google/clusterfuzzlite*"
      actions-cache:
        patterns:
          - "actions/cache*"
