name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build and publish (e.g. v2.0.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release/release-please-config.json
          manifest-file: tools/release/.release-please-manifest.json

  build-and-release:
    name: Build and Release
    needs: release-please
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    if: |
      github.repository == 'rhysmcneill/ssmctl' && (
        github.event_name == 'workflow_dispatch' ||
        (needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.tag_name != '')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Derive version from release tag
        id: version
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || needs.release-please.outputs.tag_name }}"
          test -n "$TAG"
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build all platform binaries
        run: make build-all VERSION=${{ steps.version.outputs.VERSION }}

      - name: Generate checksums
        run: |
          cd bin
          sha256sum \
            ssmctl-darwin-amd64 \
            ssmctl-darwin-arm64 \
            ssmctl-linux-amd64 \
            ssmctl-linux-arm64 \
            ssmctl-windows-amd64.exe \
            ssmctl-windows-arm64.exe > checksums.txt

      - name: Generate hashes # added for slsa generator
        shell: bash
        id: hash
        run: |
          echo "hashes=$(base64 -w0 < bin/checksums.txt)" >> "$GITHUB_OUTPUT"

      - name: Verify checksum manifest
        run: |
          cd bin
          for file in \
            ssmctl-darwin-amd64 \
            ssmctl-darwin-arm64 \
            ssmctl-linux-amd64 \
            ssmctl-linux-arm64 \
            ssmctl-windows-amd64.exe \
            ssmctl-windows-arm64.exe; do
            grep -Eq "^[0-9a-f]{64}[[:space:]]+${file}$" checksums.txt
          done

      - name: Upload release artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          fail_on_unmatched_files: true
          append_body: true
          body: |
            ## Installation
            **Homebrew:**
            ```sh
            brew tap rhysmcneill/ssmctl
            brew install ssmctl
            ```
            **Direct download:**
            Download the appropriate binary for your platform from the assets below, make it executable, and move it onto your `PATH`.
            **Verify checksum:**
            ```sh
            sha256sum --check checksums.txt
            ```
          files: |
            bin/ssmctl-*
            bin/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          SHA_DARWIN_AMD64=$(awk '/ssmctl-darwin-amd64/{print $1}' bin/checksums.txt)
          SHA_DARWIN_ARM64=$(awk '/ssmctl-darwin-arm64/{print $1}' bin/checksums.txt)
          SHA_LINUX_AMD64=$(awk  '/ssmctl-linux-amd64/{print $1}'  bin/checksums.txt)
          SHA_LINUX_ARM64=$(awk  '/ssmctl-linux-arm64/{print $1}'  bin/checksums.txt)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/rhysmcneill/homebrew-ssmctl.git" tap
          cd tap

          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "s|sha256 \".*\" # darwin-amd64|sha256 \"${SHA_DARWIN_AMD64}\" # darwin-amd64|" \
            -e "s|sha256 \".*\" # darwin-arm64|sha256 \"${SHA_DARWIN_ARM64}\" # darwin-arm64|" \
            -e "s|sha256 \".*\" # linux-amd64|sha256 \"${SHA_LINUX_AMD64}\" # linux-amd64|" \
            -e "s|sha256 \".*\" # linux-arm64|sha256 \"${SHA_LINUX_ARM64}\" # linux-arm64|" \
            Formula/ssmctl.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ssmctl.rb
          git commit -m "chore: bump ssmctl to v${VERSION}"
          git push

  provenance:
    name: Generate SLSA Provenance
    needs: [build-and-release]
    permissions:
      actions: read # "Needed for detection of GitHub Actions environment"
      id-token: write # "Needed for provenance signing and ID"
      contents: write # "Needed for release uploads"
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build-and-release.outputs.hashes }}"
      upload-assets: true
